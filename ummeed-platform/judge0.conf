# Judge0 Configuration File
# For standard settings see: https://github.com/judge0/judge0/blob/master/judge0.conf

# CPU and wall-clock execution limits
cpu_time_limit = 5.0
cpu_extra_time_limit = 1.0
wall_time_limit = 10.0

# Memory limits (in KB)
memory_limit = 262144
stack_limit = 64000

# Sandbox process limits
max_processes_and_threads = 60
enable_per_process_and_thread_time_limit = true
enable_per_process_and_thread_memory_limit = true
max_file_size = 10240

# Network sandbox configuration
enable_network = false
